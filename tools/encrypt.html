<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A320 Fragen neu verschlüsseln</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f4f6f8; color:#172033; margin:0; padding:20px; }
    main { max-width:760px; margin:0 auto; }
    .card { background:#fff; border:1px solid #dfe4ea; border-radius:18px; padding:20px; box-shadow:0 10px 30px rgba(15,23,42,.08); }
    label { display:block; font-weight:800; margin:16px 0 8px; }
    input { width:100%; padding:13px 14px; border:1px solid #dfe4ea; border-radius:14px; font-size:1rem; box-sizing:border-box; }
    button { width:100%; margin-top:18px; border:0; border-radius:16px; padding:14px 18px; font-size:1rem; font-weight:900; background:#2563eb; color:#fff; cursor:pointer; }
    .note { color:#687384; }
    .status { margin-top:14px; padding:12px; border-radius:14px; font-weight:800; background:#e0f2fe; color:#075985; }
    .bad { background:#fee2e2; color:#dc2626; }
    code { background:#f1f5f9; padding:2px 5px; border-radius:6px; }
  </style>
</head>
<body>
  <main>
    <h1>A320 Fragen neu verschlüsseln</h1>
    <section class="card">
      <p class="note">
        Dieses Tool läuft lokal im Browser. Wähle eine exportierte JSON-Datei mit Fragen, gib ein neues Passwort ein und lade danach eine neue <code>questions.enc.json</code> herunter.
      </p>

      <label for="json-file">Fragen-JSON auswählen</label>
      <input id="json-file" type="file" accept="application/json,.json" />

      <label for="password-1">Neues Passwort</label>
      <input id="password-1" type="password" />

      <label for="password-2">Passwort wiederholen</label>
      <input id="password-2" type="password" />

      <button id="encrypt-btn">questions.enc.json erstellen</button>
      <div id="status" class="status">Bereit.</div>
    </section>
  </main>

  <script>
    document.getElementById("encrypt-btn").addEventListener("click", encryptFile);

    async function encryptFile() {
      const file = document.getElementById("json-file").files[0];
      const p1 = document.getElementById("password-1").value;
      const p2 = document.getElementById("password-2").value;

      if (!window.crypto?.subtle) return setStatus("WebCrypto ist hier nicht verfügbar. Öffne dieses Tool über HTTPS oder http://localhost:8000.", true);
      if (!file) return setStatus("Bitte zuerst eine JSON-Datei auswählen.", true);
      if (!p1 || p1.length < 12) return setStatus("Bitte ein stärkeres Passwort mit mindestens 12 Zeichen wählen.", true);
      if (p1 !== p2) return setStatus("Die Passwörter stimmen nicht überein.", true);

      try {
        setStatus("Datei wird gelesen und verschlüsselt …");
        const text = await file.text();
        let parsed = JSON.parse(text);

        const payload = Array.isArray(parsed)
          ? { version: 1, createdAt: new Date().toISOString(), questions: parsed, warnings: [] }
          : parsed;

        if (!Array.isArray(payload.questions)) throw new Error("JSON enthält keine questions-Liste.");

        const encrypted = await encryptPayload(payload, p1);
        downloadTextFile("questions.enc.json", JSON.stringify(encrypted, null, 2), "application/json");
        setStatus("Fertig. Ersetze nun die alte questions.enc.json im App-Ordner durch die heruntergeladene Datei.");
      } catch (error) {
        console.error(error);
        setStatus("Fehler: " + error.message, true);
      }
    }

    async function encryptPayload(payload, password) {
      const iterations = 250000;
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoder = new TextEncoder();

      const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt"]
      );

      const plaintext = encoder.encode(JSON.stringify(payload));
      const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plaintext);

      return {
        version: 1,
        algorithm: "AES-GCM",
        kdf: "PBKDF2-SHA256",
        iterations,
        salt: bytesToBase64(salt),
        iv: bytesToBase64(iv),
        ciphertext: bytesToBase64(new Uint8Array(ciphertext))
      };
    }

    function bytesToBase64(bytes) {
      let binary = "";
      bytes.forEach((byte) => binary += String.fromCharCode(byte));
      return btoa(binary);
    }

    function downloadTextFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: `${mimeType};charset=utf-8` });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function setStatus(message, bad = false) {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = bad ? "status bad" : "status";
    }
  </script>
</body>
</html>
